services:
  - type: web
    name: muyiwafsv
    env: docker
    plan: free
    envVars:
      - key: DB_HOST
        sync: false           # Set in Render Dashboard (pooler host)
      - key: DB_PORT
        value: 6543           # Supabase pooler port (Transaction mode)
      - key: DB_USER
        sync: false           # Set in Render Dashboard (postgres.[project-ref])
      - key: DB_PASS
        sync: false           # Set in Render Dashboard (your DB password)
      - key: DB_NAME
        value: postgres
